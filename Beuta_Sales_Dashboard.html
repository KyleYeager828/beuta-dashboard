<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beuta — Sales by State Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f9fa; color: #1a1a1a; min-height: 100vh; }
  body.dark { background: #111; color: #e8e8e8; }

  header { background: #fff; border-bottom: 1px solid #e5e7eb; padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; }
  body.dark header { background: #1a1a1a; border-color: #2a2a2a; }
  .logo { font-size: 20px; font-weight: 600; letter-spacing: -0.5px; color: #111; }
  body.dark .logo { color: #f0f0f0; }
  .logo span { color: #2563eb; }
  .header-meta { font-size: 13px; color: #6b7280; }
  body.dark .header-meta { color: #9ca3af; }

  main { max-width: 1200px; margin: 0 auto; padding: 24px 24px 48px; }
  section { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 24px; margin-bottom: 24px; }
  body.dark section { background: #1a1a1a; border-color: #2a2a2a; }

  .section-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .section-sub { font-size: 12px; color: #6b7280; margin-bottom: 16px; }
  body.dark .section-sub { color: #9ca3af; }

  .controls { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
  .year-btns { display: flex; gap: 6px; flex-wrap: wrap; }

  button.ybtn {
    font-size: 12px; padding: 5px 13px; border-radius: 8px;
    border: 1px solid #d1d5db; background: #f9fafb; color: #374151; cursor: pointer;
    font-family: inherit; transition: all 0.15s;
  }
  body.dark button.ybtn { border-color: #374151; background: #222; color: #d1d5db; }
  button.ybtn:hover { background: #f3f4f6; }
  body.dark button.ybtn:hover { background: #2a2a2a; }
  button.ybtn.active { background: #eff6ff; color: #1d4ed8; border-color: #93c5fd; font-weight: 600; }
  body.dark button.ybtn.active { background: #1e3a5f; color: #93c5fd; border-color: #3b82f6; }

  select.ctrl {
    font-size: 12px; padding: 5px 10px; border-radius: 8px;
    border: 1px solid #d1d5db; background: #fff; color: #374151; cursor: pointer;
    font-family: inherit;
  }
  body.dark select.ctrl { background: #222; border-color: #374151; color: #d1d5db; }

  .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 16px; }
  @media (max-width: 640px) { .summary-grid { grid-template-columns: repeat(2,1fr); } }
  .stat-card { background: #f9fafb; border-radius: 8px; padding: 12px 14px; }
  body.dark .stat-card { background: #222; }
  .stat-label { font-size: 11px; color: #6b7280; margin-bottom: 3px; }
  body.dark .stat-label { color: #9ca3af; }
  .stat-val { font-size: 18px; font-weight: 600; line-height: 1.2; }
  .stat-sub { font-size: 10px; color: #9ca3af; margin-top: 2px; }

  #map { width: 100%; display: block; }

  .legend-row { display: flex; align-items: center; gap: 8px; justify-content: center; margin-top: 10px; }
  .legend-bar { width: 200px; height: 10px; border-radius: 5px; }
  .legend-label { font-size: 11px; color: #6b7280; }
  body.dark .legend-label { color: #9ca3af; }

  .map-hint { text-align: center; font-size: 11px; color: #9ca3af; margin-top: 6px; }

  /* Heatmap table */
  .hmap-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  table.hmap { border-collapse: collapse; font-size: 11px; min-width: 700px; width: 100%; table-layout: fixed; }
  table.hmap th { padding: 6px 4px; font-size: 11px; font-weight: 500; color: #6b7280; border-bottom: 1px solid #e5e7eb; text-align: center; }
  body.dark table.hmap th { color: #9ca3af; border-color: #2a2a2a; }
  table.hmap th:first-child { text-align: left; padding-left: 8px; position: sticky; left: 0; background: #fff; z-index: 2; }
  body.dark table.hmap th:first-child { background: #1a1a1a; }
  table.hmap td { padding: 4px 2px; text-align: center; border-bottom: 1px solid #f3f4f6; border-radius: 3px; }
  body.dark table.hmap td { border-color: #1f1f1f; }
  table.hmap td:first-child { text-align: left; padding: 4px 8px; font-weight: 500; font-size: 11px; position: sticky; left: 0; background: #fff; z-index: 1; white-space: nowrap; }
  body.dark table.hmap td:first-child { background: #1a1a1a; }
  table.hmap tr.total-row td { font-weight: 600; border-top: 2px solid #e5e7eb; }
  body.dark table.hmap tr.total-row td { border-color: #333; }
  table.hmap td.total-col { text-align: right; padding-right: 8px; font-weight: 600; color: #6b7280; }

  #tooltip {
    display: none; position: fixed; z-index: 9999;
    background: #fff; border: 1px solid #e5e7eb; border-radius: 10px;
    padding: 10px 14px; font-size: 12px; pointer-events: none;
    box-shadow: 0 4px 16px rgba(0,0,0,.12);
  }
  body.dark #tooltip { background: #1f1f1f; border-color: #333; }
  #tooltip strong { font-size: 13px; display: block; margin-bottom: 2px; }
  #tooltip .tv { font-size: 16px; font-weight: 600; }
  #tooltip .ts { font-size: 11px; color: #6b7280; margin-top: 2px; }
  body.dark #tooltip .ts { color: #9ca3af; }

  .dark-toggle { font-size: 12px; cursor: pointer; padding: 5px 10px; border-radius: 8px; border: 1px solid #e5e7eb; background: transparent; color: #374151; font-family: inherit; }
  body.dark .dark-toggle { border-color: #374151; color: #d1d5db; }

  .divider { border: none; border-top: 1px solid #e5e7eb; margin: 0; }
  body.dark .divider { border-color: #2a2a2a; }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">Beuta<span>Block</span></div>
    <div class="header-meta">Sales by State · 2023–2026 · Shopify data</div>
  </div>
  <button class="dark-toggle" onclick="toggleDark()">☾ Dark mode</button>
</header>

<main>

  <!-- ── US MAP ─────────────────────────────────────── -->
  <section>
    <div class="section-title">Sales by state — map view</div>
    <div class="section-sub">Darker = more sales. Hover any state for details.</div>

    <div class="controls">
      <div class="year-btns" id="mapYearBtns"></div>
      <div style="display:flex;align-items:center;gap:8px;">
        <span style="font-size:12px;color:#6b7280;">month</span>
        <select class="ctrl" id="mapMonthSel">
          <option value="0">All months</option>
          <option value="1">January</option><option value="2">February</option>
          <option value="3">March</option><option value="4">April</option>
          <option value="5">May</option><option value="6">June</option>
          <option value="7">July</option><option value="8">August</option>
          <option value="9">September</option><option value="10">October</option>
          <option value="11">November</option><option value="12">December</option>
        </select>
      </div>
    </div>

    <div class="summary-grid" id="mapSummary"></div>

    <svg id="map" viewBox="0 0 960 580"></svg>

    <div class="legend-row">
      <span class="legend-label">$0</span>
      <div class="legend-bar" id="legendBar"></div>
      <span class="legend-label" id="legendMax"></span>
    </div>
    <div class="map-hint">Hover any state for sales details</div>
  </section>

  <!-- ── GRID HEATMAP ────────────────────────────────── -->
  <section>
    <div class="section-title">Sales by state — month grid</div>
    <div class="section-sub">Each cell shows gross sales. Darker = higher. Hover for exact amount.</div>

    <div class="controls">
      <div class="year-btns" id="gridYearBtns"></div>
      <div style="display:flex;align-items:center;gap:8px;">
        <span style="font-size:12px;color:#6b7280;">sort by</span>
        <select class="ctrl" id="gridSort">
          <option value="total">total sales</option>
          <option value="name">state name</option>
        </select>
      </div>
    </div>

    <div class="summary-grid" id="gridSummary"></div>

    <div class="hmap-wrap">
      <table class="hmap" id="gridTable"></table>
    </div>
  </section>

</main>

<div id="tooltip"><strong id="ttState"></strong><div class="tv" id="ttVal"></div><div class="ts" id="ttSub"></div></div>

const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const ALL_STATES = ["Alabama", "Alaska", "Arizona", "Arkansas", "California", "Colorado", "Connecticut", "Delaware", "District of Columbia", "Florida", "Georgia", "Hawaii", "Idaho", "Illinois", "Indiana", "Iowa", "Kansas", "Kentucky", "Louisiana", "Maine", "Maryland", "Massachusetts", "Michigan", "Minnesota", "Mississippi", "Missouri", "Montana", "Nebraska", "Nevada", "New Hampshire", "New Jersey", "New Mexico", "New York", "North Carolina", "North Dakota", "Ohio", "Oklahoma", "Oregon", "Pennsylvania", "Rhode Island", "South Carolina", "South Dakota", "Tennessee", "Texas", "Utah", "Vermont", "Virginia", "Washington", "West Virginia", "Wisconsin", "Wyoming"];
const YEARS = ['All','2023','2024','2025','2026'];

let mapYear = 'All', mapMonth = 0;
let gridYear = 'All', gridSort = 'total';

function getVal(state, year, month) {
  const years = year === 'All' ? ['2023','2024','2025','2026'] : [year];
  let s = 0;
  for (const y of years) {
    const d = DATA[y];
    if (!d || !d[state]) continue;
    if (month === 0) { for (const v of Object.values(d[state])) s += v; }
    else s += d[state][String(month)] || 0;
  }
  return s;
}

function fmt(v) {
  if (!v) return '$0';
  return '$' + v.toLocaleString('en-US', {minimumFractionDigits:0,maximumFractionDigits:0});
}
function fmtShort(v) {
  if (!v) return '';
  if (v >= 1000) return '$' + Math.round(v/1000) + 'k';
  return '$' + Math.round(v);
}

function makeSummary(el, year, month) {
  const vals = ALL_STATES.map(s => getVal(s, year, month));
  const total = vals.reduce((a,b) => a+b, 0);
  let topI = 0; vals.forEach((v,i) => { if (v > vals[topI]) topI = i; });
  const withSales = vals.filter(v => v > 0).length;
  el.innerHTML = `
    <div class="stat-card"><div class="stat-label">total sales</div><div class="stat-val">${fmt(total)}</div></div>
    <div class="stat-card"><div class="stat-label">#1 state</div><div class="stat-val" style="font-size:15px;">${ALL_STATES[topI]}</div><div class="stat-sub">${fmt(vals[topI])}</div></div>
    <div class="stat-card"><div class="stat-label">states with sales</div><div class="stat-val">${withSales}</div></div>
    <div class="stat-card"><div class="stat-label">avg / state</div><div class="stat-val">${withSales ? fmt(Math.round(total/withSales)) : '$0'}</div></div>
  `;
}

/* ── YEAR BUTTON FACTORY ── */
function makeYearBtns(containerId, getYear, setYear, onChange) {
  const c = document.getElementById(containerId);
  YEARS.forEach(y => {
    const b = document.createElement('button');
    b.className = 'ybtn' + (y === 'All' ? ' active' : '');
    b.textContent = y === 'All' ? 'All years' : y;
    b.addEventListener('click', () => {
      setYear(y);
      c.querySelectorAll('.ybtn').forEach(btn => btn.classList.remove('active'));
      b.classList.add('active');
      onChange();
    });
    c.appendChild(b);
  });
}

/* ── TOOLTIP ── */
const tip = document.getElementById('tooltip');
function showTip(e, state, val, sub) {
  document.getElementById('ttState').textContent = state;
  document.getElementById('ttVal').textContent = fmt(val);
  document.getElementById('ttSub').textContent = sub;
  tip.style.display = 'block';
  moveTip(e);
}
function moveTip(e) {
  tip.style.left = (e.clientX + 16) + 'px';
  tip.style.top = (e.clientY - 10) + 'px';
}
function hideTip() { tip.style.display = 'none'; }

/* ── MAP ── */
const svg = d3.select('#map');
const path = d3.geoPath(d3.geoAlbersUsa().scale(1280).translate([480,290]));

function isDark() { return document.body.classList.contains('dark'); }

function getMapColor(val, maxVal) {
  if (!val || val === 0) return isDark() ? '#2a2a2a' : '#f1efe8';
  const scale = d3.scaleSequential()
    .domain([0, maxVal])
    .interpolator(isDark()
      ? d3.interpolateRgb('#1e3a5f','#3b82f6')
      : d3.interpolateRgb('#dbeafe','#1d4ed8'));
  return scale(val);
}

function updateMap() {
  const vals = {};
  ALL_STATES.forEach(s => vals[s] = getVal(s, mapYear, mapMonth));
  const maxVal = Math.max(...Object.values(vals), 1);

  svg.selectAll('path.state')
    .attr('fill', d => getMapColor(vals[d.properties.name] || 0, maxVal))
    .attr('stroke', isDark() ? 'rgba(255,255,255,0.12)' : '#fff');

  document.getElementById('legendBar').style.background = isDark()
    ? 'linear-gradient(to right,#1e3a5f,#3b82f6)'
    : 'linear-gradient(to right,#dbeafe,#1d4ed8)';
  document.getElementById('legendMax').textContent = maxVal >= 1000 ? '$' + Math.round(maxVal/1000) + 'k' : fmt(maxVal);

  makeSummary(document.getElementById('mapSummary'), mapYear, mapMonth);
}

d3.json('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json').then(us => {
  const features = topojson.feature(us, us.objects.states).features;
  svg.selectAll('path.state').data(features).join('path')
    .attr('class','state').attr('d', path)
    .attr('stroke-width', 0.6)
    .on('mouseenter', (e, d) => {
      const n = d.properties.name;
      const v = getVal(n, mapYear, mapMonth);
      const total = ALL_STATES.reduce((acc,s) => acc + getVal(s,mapYear,mapMonth), 0);
      const pct = total > 0 ? ((v/total)*100).toFixed(1) : '0.0';
      const rank = [...ALL_STATES].sort((a,b)=>getVal(b,mapYear,mapMonth)-getVal(a,mapYear,mapMonth)).indexOf(n)+1;
      showTip(e, n, v, `${pct}% of total · rank #${rank > 25 ? '25+' : rank}`);
      d3.select(e.currentTarget).attr('stroke-width',2).attr('stroke', isDark()?'rgba(255,255,255,0.5)':'#1d4ed8');
    })
    .on('mousemove', moveTip)
    .on('mouseleave', e => {
      hideTip();
      d3.select(e.currentTarget).attr('stroke-width',0.6);
    });
  updateMap();
});

makeYearBtns('mapYearBtns', ()=>mapYear, y=>{ mapYear=y; }, updateMap);
document.getElementById('mapMonthSel').addEventListener('change', e => { mapMonth=parseInt(e.target.value); updateMap(); });

/* ── GRID HEATMAP ── */
function cellColor(val, maxVal) {
  if (!val) return isDark() ? 'background:#222;' : 'background:#f9fafb;';
  const t = Math.pow(val/maxVal, 0.5);
  if (isDark()) {
    const r = Math.round(4+t*(30-4)), g = Math.round(44+t*(90-44)), b = Math.round(83+t*(180-83));
    const tr = Math.round(180-t*140), tg = Math.round(220-t*180), tb = 255;
    return `background:rgb(${r},${g},${b});color:rgb(${tr},${tg},${tb});`;
  } else {
    const r = Math.round(219-t*182), g = Math.round(234-t*196), b = Math.round(254-t*215);
    const tc = t > 0.55 ? 'rgba(255,255,255,0.95)' : '#1a1a1a';
    return `background:rgb(${r},${g},${b});color:${tc};`;
  }
}

function renderGrid() {
  const sorted = [...ALL_STATES].sort((a,b) => {
    if (gridSort === 'name') return a.localeCompare(b);
    return getVal(b,gridYear,0) - getVal(a,gridYear,0);
  }).filter(s => getVal(s,gridYear,0) > 0);

  let allVals = [];
  sorted.forEach(s => { for(let m=1;m<=12;m++) { const v=getVal(s,gridYear,m); if(v>0) allVals.push(v); } });
  const maxVal = Math.max(...allVals, 1);

  let html = `<colgroup><col style="width:130px"><col span="12" style="width:52px"><col style="width:68px"></colgroup>
  <thead><tr>
    <th style="text-align:left;">state</th>`;
  for (let m=1;m<=12;m++) html += `<th>${MONTHS[m-1]}</th>`;
  html += `<th style="text-align:right;padding-right:8px;">total</th></tr></thead><tbody>`;

  for (const st of sorted) {
    const stTotal = getVal(st, gridYear, 0);
    html += `<tr><td>${st}</td>`;
    for (let m=1;m<=12;m++) {
      const v = getVal(st, gridYear, m);
      const cs = cellColor(v, maxVal);
      html += `<td data-state="${st}" data-m="${m}" data-v="${v}" style="${cs}cursor:default;">${v>0?fmtShort(v):''}</td>`;
    }
    html += `<td class="total-col">${fmt(stTotal)}</td></tr>`;
  }

  html += `<tr class="total-row"><td>total</td>`;
  let gt = 0;
  for (let m=1;m<=12;m++) {
    const mt = sorted.reduce((a,s)=>a+getVal(s,gridYear,m),0);
    gt += mt;
    html += `<td style="${cellColor(mt,maxVal)}">${mt>0?fmtShort(mt):''}</td>`;
  }
  html += `<td class="total-col">${fmt(gt)}</td></tr></tbody>`;

  document.getElementById('gridTable').innerHTML = html;

  document.querySelectorAll('#gridTable td[data-state]').forEach(td => {
    td.addEventListener('mouseenter', e => {
      const v = parseFloat(td.dataset.v);
      if (!v) return;
      const total = sorted.reduce((a,s)=>a+getVal(s,gridYear,0),0);
      const pct = total > 0 ? ((v/total)*100).toFixed(1) : '0.0';
      showTip(e, `${td.dataset.state} · ${MONTHS[parseInt(td.dataset.m)-1]}`, v, `${pct}% of period total`);
    });
    td.addEventListener('mousemove', moveTip);
    td.addEventListener('mouseleave', hideTip);
  });

  makeSummary(document.getElementById('gridSummary'), gridYear, 0);
}

makeYearBtns('gridYearBtns', ()=>gridYear, y=>{ gridYear=y; }, renderGrid);
document.getElementById('gridSort').addEventListener('change', e => { gridSort=e.target.value; renderGrid(); });

/* ── DARK MODE ── */
function toggleDark() {
  document.body.classList.toggle('dark');
  const btn = document.querySelector('.dark-toggle');
  btn.textContent = document.body.classList.contains('dark') ? '☀ Light mode' : '☾ Dark mode';
  updateMap();
  renderGrid();
}

renderGrid();
</script>
